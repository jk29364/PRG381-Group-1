<!DOCTYPE html>
<html>
    <head>
        <title>Cleaning Inventory System</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>
        <h2>Welcome to the Cleaning Inventory System</h2>
        <!-- Button to login -->
        <form action="LoginServlet" method="get">
            <button type="submit">Login</button>
        </form>
        
        <form action="addCleaner.jsp" method="get">
        <button type="submit">Add Cleaner</button>
        </form>

        
        <!-- Button to test Dashboard -->
        <form action="dashboard" method="get">
            <button type="submit">Go to Dashboard</button>
        </form>

        <!-- Button to test Reports -->
        <form action="reports?type=inventory" method="get">
            <button type="submit">Go to Reports</button>
        </form>
        
        <!-- Button to test Materials -->
        <form action="MaterialServlet" method="get">
            <button type="submit">Go to Materials</button>
        </form>
    </body>
</html>
